version: '3.8'

services:

  backend:
    image: rishabsingh12/taskflow-backend:latest
    container_name: task_manager_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE}
      - NODE_ENV=production
      - CLIENT_URL=http://${SERVER_IP}
    networks:
      - app_network

  frontend:
    image: rishabsingh12/taskflow-frontend:latest
    container_name: task_manager_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge