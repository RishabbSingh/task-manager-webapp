version: '3.8'

services:

  # ─── Backend: Node.js API ───────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE}
      - NODE_ENV=production
      - CLIENT_URL=http://${SERVER_IP}
    networks:
      - taskflow_network

  # ─── Frontend: React + Nginx ────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - taskflow_network

networks:
  taskflow_network:
    driver: bridge