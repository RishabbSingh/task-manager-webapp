global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Monitor the backend API
  - job_name: 'taskmanager-backend'
    static_configs:
      - targets: ['backend:5000']

  # Monitor Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']